<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link href="assets/img/favicon/favicon.png" rel="icon" />
    <link href="assets/img/favicon/favicon.png" rel="apple-touch-icon" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Poppins", "sans-serif"],
            },
            colors: {
              brand: {
                pink: "#EC4899",
                purple: "#9333EA",
                rose: "#FB7185",
              },
            },
            animation: {
              float: "float 6s ease-in-out infinite",
              "pulse-slow": "pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "bounce-slow": "bounce 3s infinite",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-20px)" },
              },
            },
          },
        },
      };
    </script>

    <style>
      .gradient-text {
        background: linear-gradient(135deg, #ec4899 0%, #9333ea 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-around;

        background: #7b0269;
        backdrop-filter: blur(14px);
      }

      header img {
        height: 70px;
        width: auto;
        object-fit: contain;
      }

      .header-tag {
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: white;
        border: 1px solid white;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
      }

      .gradient-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .glass-effect {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .typing-effect::after {
        content: "|";
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .product-card {
        transition: all 0.3s ease;
      }

      .product-card:hover {
        transform: translateY(-5px);
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-pink-50 via-purple-50 to-indigo-50 min-h-screen font-sans overflow-x-hidden"
  >
    <!-- Background Decorations -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
      <div
        class="absolute -top-40 -right-40 w-80 h-80 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse-slow"
      ></div>
      <div
        class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse-slow"
        style="animation-delay: 2s"
      ></div>
      <div
        class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-rose-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse-slow"
        style="animation-delay: 4s"
      ></div>
    </div>
    <header>
      <img src="assets/img/logo-personaliseecia.png" alt="Personalize e Cia" />
        <ul class="flex gap-8 p-4 rounded-lg">
            <li class="text-white hover:text-gray-800 cursor-pointer font-medium transition-all duration-300 hover:scale-105"><a href="index.html">Inicio</a></li>
            <li class="text-white hover:text-gray-800 cursor-pointer font-medium border-b border-gray-300 transition-all duration-300 hover:scale-105">Sobre</li>
        </ul>
      <span class="header-tag">Em breve</span>
    </header>

    <!-- Main Container -->
    <div
      class="relative z-10 container mx-auto px-4 pt-32 min-h-screen flex flex-col justify-center items-center"
    >
      <!-- Coming Soon Message -->
      <div class="max-w-3xl mx-auto text-center mb-12">
        <div
          class="glass-effect rounded-3xl p-8 md:p-12 shadow-2xl bg-white/80"
        >
        <h2
            class="text-3xl md:text-5xl font-bold text-gray-800 mb-6 leading-tight"
          >
            EM DESEVOLVIMENTO
        </h2>
        </div>
      </div> 

      <!-- CTA Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md px-4">
        <a
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          class="flex-1 flex items-center justify-center gap-3 bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 text-white px-8 py-4 rounded-2xl font-bold text-lg shadow-lg hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 group"
        >
          <i
            data-lucide="instagram"
            class="w-6 h-6 group-hover:rotate-12 transition-transform"
          ></i>
          <span>Instagram</span>
        </a>

        <a
          href="https://wa.me/5575999539033"
          target="_blank"
          rel="noopener noreferrer"
          class="flex-1 flex items-center justify-center gap-3 bg-white text-green-600 border-2 border-green-500 px-8 py-4 rounded-2xl font-bold text-lg shadow-lg hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 group hover:bg-green-50"
        >
          <i
            data-lucide="message-circle"
            class="w-6 h-6 group-hover:scale-110 transition-transform"
          ></i>
          <span>WhatsApp</span>
        </a>
      </div>

      <!-- Contact Info -->
      <div class="mt-8 text-center gap-3 bg-white text-green-600 border-2 px-8 py-4 rounded-2xl font-bold text-lg shadow-lg hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 group hover:bg-green-50">
        <p class="text-gray-600 flex items-center justify-center gap-2">
          <i data-lucide="phone" class="w-4 h-4"></i>
          <span class="font-semibold">(75) 99953-9033</span>
        </p>
      </div>
    </div>

    <!-- Footer -->
      <footer class="border-t border-gray-300">
        <div class="max-w-7xl mx-auto px-4 py-4">
          <div class="flex flex-col items-center space-y-2">
            <p class="text-gray-500 text-sm">
              &copy; 2026 Personalize e Cia. Todos os direitos reservados.
            </p>
            <p class="text-gray-500 text-sm flex items-center gap-1">
              Feito com <span class="text-red-500 animate-pulse">Amor</span> em
              Santo Estêvão
            </p>
            <div class="flex items-center gap-2">
              <span class="text-gray-400 text-sm">Desenvolvido por</span>
              <a
                href="https://samuelsouza.net.br/"
                target="_blank"
                class="text-purple-600 hover:text-purple-800 font-semibold transition-all duration-300 hover:scale-105"
              >
                Samuel Souza
              </a>
            </div>
          </div>
        </div>
      </footer>

    <script>
      // Initialize Lucide Icons
      lucide.createIcons();

      // Countdown Timer (Set to 30 days from now for demo)
      const targetDate = new Date();
      targetDate.setDate(targetDate.getDate() + 30);

      function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").textContent = String(days).padStart(
          2,
          "0",
        );
        document.getElementById("hours").textContent = String(hours).padStart(
          2,
          "0",
        );
        document.getElementById("minutes").textContent = String(
          minutes,
        ).padStart(2, "0");
        document.getElementById("seconds").textContent = String(
          seconds,
        ).padStart(2, "0");
      }

      setInterval(updateCountdown, 1000);
      updateCountdown();

      // Add smooth scroll behavior
      document.documentElement.style.scrollBehavior = "smooth";

      // Add entrance animation for elements
      const observerOptions = {
        threshold: 0.1,
        rootMargin: "0px 0px -50px 0px",
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = "1";
            entry.target.style.transform = "translateY(0)";
          }
        });
      }, observerOptions);

      // Observe all product cards
      document.querySelectorAll(".product-card").forEach((el, index) => {
        el.style.opacity = "0";
        el.style.transform = "translateY(20px)";
        el.style.transition = `opacity 0.6s ease ${index * 0.1}s, transform 0.6s ease ${index * 0.1}s`;
        observer.observe(el);
      });
    </script>
  </body>
</html>
